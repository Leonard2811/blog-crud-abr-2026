{% extends '_base.html' %}

{% block content %}
    <h2>{{ article.title }}</h2>
    <p>><strong>Autor:</strong> {{ article.author }}</p>
    <small>Fecha de creación: {{ article.created_at }}</small>
    <p><strong>Contenido:</strong> {{ article.content }}</p>
    <a href="{% url 'article_update' article.id %}">Editar</a> |
    <a href="{% url 'article_delete' article.id %}">Eliminar</a>
{% endblock content %}
